spring:
  application:
    name: bloom-api
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    mapper:
      accept-case-insensitive-enums: true
  mail:
    host: ${MAIL_HOST:smtp.mail.ovh.net}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:contact@gilmotech.be}
    password: ${MAIL_PASSWORD:Gilmo=270188}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${MAIL_SSL:true}
          starttls:
            enable: ${MAIL_STARTTLS:false}

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:e8AzJvzMtQpKYnp4fiET1NcnNAgsjQ65Rd+3yJ1lEzQ=}
    expiration: 86400000        # 24h
    refresh-expiration: 604800000  # 7j
  upload:
    dir: /home/claude-worker/arsbotanica/uploads/
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    return-url: ${STRIPE_RETURN_URL:https://arsbotanica.gilmotech.be/commande/success}
  mail:
    from: ${MAIL_FROM:contact@gilmotech.be}
    from-name: Ars Botanica
  frontend:
    url: ${FRONTEND_URL:https://arsbotanica.gilmotech.be}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
