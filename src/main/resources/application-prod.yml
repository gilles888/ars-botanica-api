spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arsbotanica}
    username: ${DATABASE_USERNAME:arsbotanica}
    password: ${DATABASE_PASSWORD:ArsBotanicaProd2024!}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

server:
  port: ${SERVER_PORT:8082}

# Clé JWT sécurisée de 256 bits minimum pour HMAC-SHA256
# La valeur DOIT être fournie via la variable d'environnement JWT_SECRET (définie dans le service systemd)
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
    refresh-expiration: 604800000
