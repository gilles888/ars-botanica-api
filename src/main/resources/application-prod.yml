spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arsbotanica}
    username: ${DATABASE_USERNAME:arsbotanica}
    password: ${DATABASE_PASSWORD:ArsBotanicaProd2024!}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

server:
  port: ${SERVER_PORT:8082}

