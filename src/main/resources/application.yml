server:
  port: 8081

spring:
  application:
    name: bloom-api

  datasource:
    url: jdbc:h2:mem:bloomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

app:
  jwt:
    secret: 4f7291b5e3a8c1d9f2047e6b3a5c8d1e9f2047e6b3a5c8d1e9f2047e6b3a5c8
    expiration: 86400000   # 24h en ms
    refresh-expiration: 604800000  # 7j en ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
